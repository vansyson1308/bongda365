services:
  - type: web
    name: bongda365
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # SOFA_PROXY_URL: set via Render dashboard if external proxy is available
      # Without proxy, server uses undici fetch + https.get + stale cache fallback
