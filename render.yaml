services:
  - type: web
    name: bongda365
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # CF_WORKER_URL: Cloudflare Worker proxy (primary — same CF network, never blocked)
      # Deploy cf-worker-proxy.js then set URL here, e.g. https://sofa-proxy.<your-subdomain>.workers.dev
      # SOFA_PROXY_URL: local proxy via Cloudflare Tunnel (secondary fallback)
